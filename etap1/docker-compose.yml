services:
  app:
    build: ./app
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-pbf}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-secret}
      SMTP_HOST: ${SMTP_HOST:-sandbox.smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@pbf.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hobbit Expedition 2000}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_NAME: ${APP_NAME:-Hobbit Expedition 2000}

  db:
    build: ./db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-secret}
      MYSQL_DATABASE: ${DB_NAME:-pbf}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

volumes:
  db_data:
